<script>
    fetch('simuscribe-curriculum.csv')
    .then(res => res.text())
    .then(text => {
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
        const headers = rows[0].split(',');
        
        // Find column indexes safely
        const idx = {
            disc: headers.indexOf('discipline'),
            cc: headers.indexOf('chief_complaint'),
            hpi: headers.indexOf('history_present_illness'),
            assessment: headers.indexOf('soap_assessment')
        };

        const sidebar = document.getElementById('sidebar');
        const grouped = {};

        // Process rows and group by discipline
        rows.slice(1).forEach(row => {
            const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
            if(!cols || cols[idx.disc] === undefined) return;
            
            const disc = cols[idx.disc].trim();
            if(!grouped[disc]) grouped[disc] = [];
            grouped[disc].push(cols);
        });

        // Build Sidebar: Only show Discipline headers and Complaint buttons
        for (let disc in grouped) {
            sidebar.innerHTML += `<div class="cat-title">${disc}</div>`;
            grouped[disc].forEach(cols => {
                const complaint = cols[idx.cc] ? cols[idx.cc].replace(/"/g, '') : "No Complaint Listed";
                const btn = document.createElement('button');
                btn.className = 'case-btn';
                btn.innerText = complaint;
                
                btn.onclick = () => {
                    document.getElementById('m-title').innerText = complaint;
                    // Safety checks: Fallback to "Data not found" instead of "undefined"
                    document.getElementById('m-hpi').innerText = cols[idx.hpi] ? cols[idx.hpi].replace(/"/g, '') : "N/A";
                    document.getElementById('m-assessment').innerText = cols[idx.assessment] ? cols[idx.assessment].replace(/"/g, '') : "N/A";
                    document.getElementById('modal').style.display = 'flex';
                };
                sidebar.appendChild(btn);
            });
        }
    });
</script>
