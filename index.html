<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Curriculum Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #f4f4f4; text-align: left; padding: 10px; border-bottom: 2px solid #ddd; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .error { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SimuScribe Curriculum</h1>
    <div id="data-container">Loading curriculum data...</div>

    <script>
        async function loadCurriculum() {
            try {
                const response = await fetch('simuscribe-curriculum.csv');
                if (!response.ok) throw new Error('Failed to load CSV file.');
                
                const data = await response.text();
                const rows = data.split('\n').filter(row => row.trim() !== '');
                const headers = rows[0].split(',');
                const container = document.getElementById('data-container');

                let html = '<table><thead><tr>';
                headers.forEach(h => html += `<th>${h.replace(/_/g, ' ')}</th>`);
                html += '</tr></thead><tbody>';

                // Display up to 10 rows
                for(let i = 1; i < Math.min(rows.length, 11); i++) {
                    const cols = rows[i].split(',');
                    html += '<tr>' + cols.map(c => `<td>${c}</td>`).join('') + '</tr>';
                }
                
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('data-container').innerHTML = `<p class="error">Error: ${err.message}</p>`;
            }
        }
        loadCurriculum();
    </script>
</body>
</html>
