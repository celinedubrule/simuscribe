<div id="case-modal" class="modal-mask" onclick="closeCaseOutside(event)">
    <div class="modal-window">
        <div class="modal-header">
            <div>
                <span id="modal-id-meta" style="font-size: 0.7rem; color: #64748b;">IM T1 0093 • ICD-10 M86.9</span>
                <h2 id="modal-title" style="margin: 5px 0 0 0; font-size: 1.5rem;">Joint stiffness in hands</h2>
                <div style="margin-top: 10px;">
                    <span class="tag tag-blue">IM / FP</span>
                    <span class="tag tag-blue">TIER 1 - FOUNDATION</span>
                </div>
            </div>
            <button class="modal-close" onclick="closeCase()" style="background: none; border: none; font-size: 1.5rem;">×</button>
        </div>

        <div class="vital-grid">
            <div class="vital-item"><span>BP</span><strong id="v-bp">128/78</strong></div>
            <div class="vital-item"><span>HR</span><strong id="v-hr">82</strong></div>
            <div class="vital-item"><span>RR</span><strong id="v-rr">16</strong></div>
            <div class="vital-item"><span>TEMP</span><strong id="v-temp">37.0</strong></div>
            <div class="vital-item"><span>SPO2</span><strong id="v-spo2">98%</strong></div>
        </div>

        <div class="clinical-grid">
            <div>
                <div class="section-title">History of Present Illness</div>
                <p id="modal-hpi" style="font-size: 0.9rem; line-height: 1.5;">Patient presents with...</p>
            </div>
            <div>
                <div class="section-title">Physical Exam</div>
                <p id="modal-pe" style="font-size: 0.9rem; line-height: 1.5;">Vitals: BP 128/78, HR 82...</p>
            </div>
        </div>
    </div>
</div>
