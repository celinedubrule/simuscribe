<script>
    async function loadCases() {
        const response = await fetch('simuscribe-curriculum.csv');
        const text = await response.text();
        
        // Split rows, handling quotes properly
        const rows = text.split(/\r?\n/).filter(row => row.length > 0);
        const headers = rows[0].split(',').map(h => h.trim());

        const tbody = document.querySelector('#matrix tbody');
        
        // Loop through data rows
        for (let i = 1; i < rows.length; i++) {
            // Regex: split by comma but ignore commas inside double quotes
            const cols = rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
            if (!cols) continue;

            // Map columns by header name
            const get = (name) => {
                const idx = headers.indexOf(name);
                return cols[idx] ? cols[idx].replace(/^"|"$/g, '') : "N/A";
            };

            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${get('case_code')}</td><td>${get('chief_complaint')}</td>`;
            
            tr.onclick = () => {
                document.getElementById('m-title').innerText = get('chief_complaint');
                document.getElementById('m-hpi').innerText = get('history_present_illness');
                document.getElementById('m-assessment').innerText = get('soap_assessment');
                document.getElementById('m-plan').innerText = get('soap_plan');
                document.getElementById('modal').style.display = 'flex';
            };
            tbody.appendChild(tr);
        }
    }
    loadCases();
</script>
