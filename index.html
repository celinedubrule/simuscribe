<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SimuScribe | Institutional Administration Suite</title>
    <style>
        :root { --bg: #f8fafc; --sidebar: #1e293b; --text: #1e293b; --accent: #3b82f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 20px; }
        .workspace { flex-grow: 1; padding: 40px; }
        .tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #e2e8f0; margin-right: 5px; }
        .tag-blue { background: #dbeafe; color: #1e40af; }
        
        /* Modal Styles */
        .modal-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; }
        .modal-window { background: #ffffff; color: var(--text); width: 90%; max-width: 800px; border-radius: 4px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .modal-header { border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .vital-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 4px; margin-bottom: 25px; }
        .vital-item { text-align: center; }
        .vital-item span { font-size: 0.65rem; color: #64748b; text-transform: uppercase; display: block; }
        .vital-item strong { font-size: 1rem; color: #0f172a; }
        .clinical-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .section-title { font-size: 0.7rem; font-weight: 700; color: #475569; text-transform: uppercase; margin-bottom: 8px; }
    </style>
</head>
<body>

        <h2>SimuScribe Suite</h2>
        <div onclick="document.getElementById('case-modal').style.display='flex'" style="cursor:pointer; padding:10px; background:#334155; border-radius:4px;">📋 View Active Case (Demo)</div>
    </div>

    <div class="workspace">
        <h1>SimuScribe Command Center</h1>
        <p>Turnkey simulation matrices mapped for immediate curriculum deployment.</p>
    </div>

                </div>
