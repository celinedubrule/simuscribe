<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinical Matrix Suite</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; margin: 0; display: flex; }
        .sidebar { width: 260px; background: #1e293b; color: white; height: 100vh; padding: 20px; }
        .main-content { flex: 1; padding: 40px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; cursor: pointer; }
        
        /* Emergent-Style Modal */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-container { background: white; width: 900px; height: 85vh; padding: 30px; border-radius: 8px; display: flex; gap: 30px; overflow-y: auto; }
        .section-title { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-top: 15px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="sidebar"><h2>Clinical Matrix</h2></div>
<div class="main-content">
    <h1>Active Scenario Library</h1>
    <table id="matrix">
        <thead><tr><th>ID</th><th>Scenario Title</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-container" onclick="event.stopPropagation()">
        <div style="flex: 2;">
            <h2 id="m-title"></h2>
            <div class="section-title">History of Present Illness</div>
            <p id="m-hpi"></p>
            <div class="section-title">Histories (PMH/Soc/Fam/ROS)</div>
            <p id="m-histories"></p>
            <div class="section-title">Assessment & Plan</div>
            <p id="m-ap"></p>
        </div>
        <div style="flex: 1; background: #f1f5f9; padding: 20px; border-radius: 4px;">
            <h3>Vitals & PE</h3>
            <p id="m-vitals"></p>
            <p id="m-pe"></p>
            <h3>Learning Objectives</h3>
            <p id="m-obj"></p>
            <h3>Behavior Script</h3>
            <p id="m-script"></p>
        </div>
    </div>
</div>

<script>
    fetch('cases.json')
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#matrix tbody');
            data.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${c.id}</td><td>${c.title}</td>`;
                tr.onclick = () => showModal(c);
                tbody.appendChild(tr);
            });
        });

    function showModal(c) {
        document.getElementById('m-title').innerText = c.title;
        document.getElementById('m-hpi').innerText = c.subjective.hpi;
        document.getElementById('m-histories').innerText = `PMH: ${c.subjective.pmh} | Social: ${c.subjective.socialHistory} | Family: ${c.subjective.familyHistory} | ROS: ${c.subjective.ros}`;
        document.getElementById('m-ap').innerText = `${c.assessment}: ${c.plan}`;
        document.getElementById('m-vitals').innerText = c.objective.vitals;
        document.getElementById('m-pe').innerText = c.objective.physicalExam;
        document.getElementById('m-obj').innerText = c.learningObjectives;
        document.getElementById('m-script').innerText = c.patientBehaviorScript;
        document.getElementById('modal').style.display = 'flex';
    }
</script>
</body>
</html>
