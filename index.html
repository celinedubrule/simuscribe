<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SimuScribe | Clinical Library</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; display: flex; }
        .sidebar { width: 300px; background: #0f172a; color: white; height: 100vh; padding: 20px; position: fixed; overflow-y: auto; }
        .main { margin-left: 300px; padding: 40px; width: 100%; }
        
        /* Discipline Headers */
        .cat-title { color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; margin: 20px 0 10px; }
        
        /* Buttons */
        .case-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: #1e293b; color: white; border: none; border-radius: 6px; text-align: left; cursor: pointer; }
        .case-btn:hover { background: #3b82f6; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .m-box { background: white; width: 800px; padding: 40px; border-radius: 12px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar"><h2>Disciplines</h2></div>

<div class="main">
    <h1>Select a Case to Begin</h1>
    <p>Use the left sidebar to navigate by discipline and chief complaint.</p>
</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
    <div class="m-box" onclick="event.stopPropagation()">
        <h2 id="m-title"></h2>
        <h4>History of Present Illness</h4><p id="m-hpi"></p>
        <h4>Assessment</h4><p id="m-assessment"></p>
    </div>
</div>

<script>
    fetch('simuscribe-curriculum.csv')
    .then(res => res.text())
    .then(text => {
        const rows = text.split(/\r?\n/).slice(1);
        const headers = text.split(/\r?\n/)[0].split(',');
        const getIdx = (name) => headers.indexOf(name);
        
        const sidebar = document.getElementById('sidebar');
        const grouped = {};

        // Group data by discipline
        rows.forEach(row => {
            const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
            if(!cols) return;
            const disc = cols[getIdx('discipline')];
            if(!grouped[disc]) grouped[disc] = [];
            grouped[disc].push(cols);
        });

        // Build Sidebar
        for (let disc in grouped) {
            sidebar.innerHTML += `<div class="cat-title">${disc}</div>`;
            grouped[disc].forEach(cols => {
                const btn = document.createElement('button');
                btn.className = 'case-btn';
                btn.innerText = cols[getIdx('chief_complaint')];
                btn.onclick = () => {
                    document.getElementById('m-title').innerText = cols[getIdx('chief_complaint')];
                    document.getElementById('m-hpi').innerText = cols[getIdx('history_present_illness')];
                    document.getElementById('m-assessment').innerText = cols[getIdx('soap_assessment')];
                    document.getElementById('modal').style.display = 'flex';
                };
                sidebar.appendChild(btn);
            });
        }
    });
</script>
</body>
</html>
