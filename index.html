<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinical Simulation Suite</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; background: #f8fafc; }
        #sidebar { width: 300px; height: 100vh; background: #0f172a; color: white; position: fixed; overflow-y: auto; transition: 0.3s; }
        .main { margin-left: 300px; padding: 40px; width: 100%; }
        
        /* Hierarchy Styling */
        .tier-header { padding: 15px; font-weight: bold; background: #1e293b; color: #60a5fa; cursor: pointer; border-top: 1px solid #334155; }
        .disc-header { padding: 10px 10px 10px 25px; font-size: 0.9rem; color: #94a3b8; cursor: pointer; }
        .case-btn { display: block; width: 100%; padding: 8px 10px 8px 40px; background: none; border: none; color: #cbd5e1; text-align: left; cursor: pointer; }
        .case-btn:hover { color: white; background: #334155; }
        
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .m-box { background: white; width: 900px; height: 80vh; border-radius: 12px; display: flex; overflow: hidden; }
        .m-left { flex: 2; padding: 40px; overflow-y: auto; }
        .m-right { flex: 1; background: #f8fafc; padding: 40px; border-left: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div id="sidebar"></div>

<div class="main">
    <h1>Clinical Library</h1>
    <p>Use the nested menu to select your Tier, Discipline, and Case.</p>
</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
    <div class="m-box" onclick="event.stopPropagation()">
        <div class="m-left">
            <h2 id="m-title"></h2>
            <h4>HPI</h4><p id="m-hpi"></p>
            <h4>Assessment</h4><p id="m-assessment"></p>
        </div>
        <div class="m-right">
            <h3>Vitals</h3><p id="m-vitals"></p>
            <h4>Objectives</h4><p id="m-obj"></p>
        </div>
    </div>
</div>

<script>
    fetch('simuscribe-curriculum.csv')
    .then(res => res.text())
    .then(text => {
        const rows = text.split(/\r?\n/).slice(1);
        const headers = text.split(/\r?\n/)[0].split(',');
        const getIdx = (name) => headers.indexOf(name);
        
        // Data Structure: { Tier: { Discipline: [Cases] } }
        const tree = {};
        rows.forEach(row => {
            const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
            if(!cols) return;
            const tier = cols[getIdx('tier')] || "Uncategorized";
            const disc = cols[getIdx('discipline')] || "General";
            if(!tree[tier]) tree[tier] = {};
            if(!tree[tier][disc]) tree[tier][disc] = [];
            tree[tier][disc].push(cols);
        });

        const sidebar = document.getElementById('sidebar');
        for (let tier in tree) {
            sidebar.innerHTML += `<div class="tier-header">${tier}</div>`;
            for (let disc in tree[tier]) {
                sidebar.innerHTML += `<div class="disc-header">${disc}</div>`;
                tree[tier][disc].forEach(cols => {
                    const btn = document.createElement('button');
                    btn.className = 'case-btn';
                    btn.innerText = cols[getIdx('chief_complaint')];
                    btn.onclick = () => {
                        document.getElementById('m-title').innerText = cols[getIdx('chief_complaint')];
                        document.getElementById('m-hpi').innerText = cols[getIdx('history_present_illness')].replace(/"/g, '');
                        document.getElementById('m-assessment').innerText = cols[getIdx('soap_assessment')].replace(/"/g, '');
                        document.getElementById('m-vitals').innerText = cols[getIdx('vitals_BP')];
                        document.getElementById('m-obj').innerText = cols[getIdx('learning_objectives')].replace(/"/g, '');
                        document.getElementById('modal').style.display = 'flex';
                    };
                    sidebar.appendChild(btn);
                });
            }
        }
    });
</script>
</body>
</html>
