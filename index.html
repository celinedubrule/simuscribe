<script>
    fetch('simuscribe-curriculum.csv')
        .then(res => res.text())
        .then(text => {
            // Split into lines
            const lines = text.split(/\r?\n/);
            const headers = lines[0].split(',').map(h => h.trim());
            
            // This function finds the column index by the header name
            const getCol = (cols, name) => {
                const idx = headers.indexOf(name);
                return cols[idx] || "N/A"; // Returns "N/A" instead of "undefined"
            };

            const tbody = document.querySelector('#matrix tbody');
            
            // Process rows
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                // Complex regex to handle commas inside quoted clinical notes
                const cols = lines[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                if (!cols) continue;

                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${getCol(cols, 'case_code')}</td><td>${getCol(cols, 'chief_complaint')}</td>`;
                
                tr.onclick = () => {
                    document.getElementById('m-title').innerText = getCol(cols, 'chief_complaint');
                    document.getElementById('m-hpi').innerText = getCol(cols, 'history_present_illness');
                    document.getElementById('m-assessment').innerText = getCol(cols, 'soap_assessment');
                    document.getElementById('m-plan').innerText = getCol(cols, 'soap_plan');
                    document.getElementById('answer').style.display = 'none';
                    document.getElementById('modal').style.display = 'flex';
                };
                tbody.appendChild(tr);
            }
        });
</script>
