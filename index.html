<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinical Simulation Dashboard</title>
    <style>
        /* CSS for the Emergent-style layout */
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #1e293b; color: white; height: 100vh; padding: 20px; }
        .workspace { flex: 1; padding: 40px; }
        .matrix-row { cursor: pointer; background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        
        /* Modal Overlay */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; width: 800px; padding: 30px; border-radius: 8px; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <div class="sidebar"><h2>Simulation Center</h2></div>
    <div class="workspace">
        <h1>Active Case Matrix</h1>
        <div class="matrix-row" onclick="openCase('Patient A', 'Acute presentation...')">
            Case 001: Acute Respiratory Distress
        </div>
    </div>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title">Case Title</h2>
            <div class="grid">
                <div id="modal-hpi">History: ...</div>
                <div id="modal-exam">Exam: ...</div>
            </div>
        </div>
    </div>

    <script>
        function openCase(title, hpi) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-hpi').innerText = hpi;
            document.getElementById('modal').style.display = 'flex';
        }
    </script>
</body>
</html>
