<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
        <h1>SimuScribe Curriculum</h1>
        <div id="data-container">Loading curriculum...</div>
    </div>

    <script>
        // Fetch the CSV file from the same folder
        fetch('simuscribe-curriculum.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n');
                const headers = rows[0].split(',');
                const container = document.getElementById('data-container');
                
                let html = '<table border="1"><tr>';
                headers.forEach(h => html += `<th>${h}</th>`);
                html += '</tr>';

                // Display the first 5 rows for testing
                for(let i = 1; i <= 5 && i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    html += '<tr>';
                    cols.forEach(c => html += `<td>${c}</td>`);
                    html += '</tr>';
                }
                html += '</table>';
                container.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('data-container').innerText = "Error loading CSV: " + err;
            });
    </script>
</body>
