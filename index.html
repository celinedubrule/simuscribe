<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Page</title>
</head>
<body>
    <h1>Site is Loading...</h1>
    <table id="matrix">
        <thead><tr><th>ID</th><th>Title</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        console.log("Script is running!"); // Check the console for this!
        const data = [
            { "id": "TEST", "title": "Connection Test" }
        ];
        const tbody = document.querySelector('#matrix tbody');
        data.forEach(c => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${c.id}</td><td>${c.title}</td>`;
            tbody.appendChild(tr);
        });
        alert("Script finished running!");
    </script>
</body>
</html>
